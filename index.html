<!DOCTYPE html>
<html>

<head>
    <title>AR Interior Design with Lighting</title>

    <!-- A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js Library -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

    <a-scene embedded arjs>

        <!-- Camera -->
        <a-entity camera></a-entity>

        <!-- Lights -->
        <!-- Ambient Light: soft, general illumination -->
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.5"></a-entity>

        <!-- Directional Light: simulates sunlight -->
        <a-entity light="type: directional; color: #ffffff; intensity: 0.7" position="2 4 3"></a-entity>

        <!-- Point Light: spot / lamp effect -->
        <a-entity light="type: point; color: #ffffaa; intensity: 0.6; distance: 5" position="0 2 0"></a-entity>

        <!-- Marker -->
        <a-marker preset="hiro">

            <!-- Floor -->
            <a-plane position="0 0 0" rotation="-90 0 0" width="4" height="4" color="#cccccc">
            </a-plane>

            <!-- Sofa / Furniture -->
            <a-box position="0 0.5 0" depth="1.5" height="1" width="2" color="brown" shadow="receive: true">
            </a-box>

            <!-- Table -->
            <a-cylinder position="1 0.5 0" radius="0.3" height="1" color="#8B4513" shadow="receive: true">
            </a-cylinder>

            <!-- Plant -->
            <a-cone position="-1 0.5 0" radius-bottom="0.3" height="1" color="green" shadow="receive: true">
            </a-cone>

        </a-marker>

        <!-- Enable shadows -->
        <a-entity light="type: directional; castShadow: true"></a-entity>

    </a-scene>

</body>

</html>
