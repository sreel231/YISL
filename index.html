<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>3D House Navigation Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="instructions">
        <strong>Controls:</strong><br>
        W/A/S/D - Move<br>
        Mouse - Look Around<br>
        Click screen to start.
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x404040, 1.5)); // Soft room light

        // --- HOUSE BUILDER HELPERS ---
        const textureLoader = new THREE.TextureLoader();
        const createWall = (w, h, d, x, y, z, color = 0xeeeeee) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, y, z);
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            scene.add(mesh);
        };

        const createFurniture = (w, h, d, x, y, z, color) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            scene.add(mesh);
        };

        // Floor (The Foundation)
        createWall(30, 0.2, 20, 0, 0, 0, 0x808080);

        // Walls (Outer Shell)
        createWall(30, 4, 0.5, 0, 2, -10); // Back wall
        createWall(30, 4, 0.5, 0, 2, 10);  // Front wall
        createWall(0.5, 4, 20, -15, 2, 0); // Left wall
        createWall(0.5, 4, 20, 15, 2, 0);  // Right wall

        // Room Dividers
        createWall(0.5, 4, 10, -5, 2, -5); // Kitchen/Living divider
        createWall(10, 4, 0.5, 10, 2, 0);  // Bedroom wall

        // --- FURNITURE SECTIONS ---
        // Living Room (Center)
        createFurniture(4, 0.5, 2, 0, 0.3, -5, 0x333333); // Sofa
        createFurniture(1, 2, 4, -14, 1, 0, 0x4B2C20);   // Bookshelf

        // Kitchen (Left)
        createFurniture(6, 1, 1.5, -12, 0.5, -8, 0xffffff); // Countertop
        const kitchenLight = new THREE.PointLight(0xffaa00, 5, 10);
        kitchenLight.position.set(-12, 3, -8);
        scene.add(kitchenLight); // Warm kitchen glow

        // Bedroom (Right)
        createFurniture(3, 0.8, 4, 10, 0.4, 5, 0x1a5e91); // Bed
        const bedLight = new THREE.PointLight(0x00ffaa, 3, 8);
        bedLight.position.set(10, 3, 5);
        scene.add(bedLight); // Cool bedroom accent

        // --- CONTROLS & NAVIGATION ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        };
        const onKeyUp = (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        camera.position.set(0, 1.6, 5); // Human eye level

        // --- ANIMATION LOOP ---
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * 0.016;
                velocity.z -= velocity.z * 10.0 * 0.016;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * 0.016;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * 0.016;

                controls.moveRight(-velocity.x * 0.016);
                controls.moveForward(-velocity.z * 0.016);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
