<!DOCTYPE html>
<html>

<head>
    <title>Virtual House Navigation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene>

        <!-- Camera with WASD navigation and look controls -->
        <a-entity camera position="0 1.6 5" wasd-controls="acceleration: 20" look-controls>
        </a-entity>

        <!-- Lighting -->
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.5"></a-entity>
        <a-entity light="type: directional; intensity: 0.7" position="5 10 5"></a-entity>
        <a-entity light="type: point; intensity: 0.6; distance: 10" position="0 3 0"></a-entity>

        <!-- Floor -->
        <a-plane rotation="-90 0 0" width="20" height="20" color="#ddd" shadow></a-plane>

        <!-- House walls -->
        <a-box position="0 1 -5" depth="10" height="2" width="0.2" color="#b0c4de"></a-box> <!-- Back wall -->
        <a-box position="-5 1 0" depth="0.2" height="2" width="10" color="#b0c4de"></a-box> <!-- Left wall -->
        <a-box position="5 1 0" depth="0.2" height="2" width="10" color="#b0c4de"></a-box> <!-- Right wall -->
        <a-box position="0 1 5" depth="10" height="2" width="0.2" color="#b0c4de"></a-box> <!-- Front wall -->

        <!-- Ceiling -->
        <a-box position="0 2.1 0" width="10" depth="10" height="0.2" color="#f5f5f5"></a-box>

        <!-- Furniture -->

        <!-- Sofa -->
        <a-box position="-2 0.5 -2" width="2" height="1" depth="1" color="brown" shadow></a-box>

        <!-- Table -->
        <a-cylinder position="0 0.5 -1" radius="0.5" height="1" color="#8B4513" shadow></a-cylinder>

        <!-- Plant -->
        <a-cone position="2 0.5 -2" radius-bottom="0.3" height="1" color="green" shadow></a-cone>

        <!-- Lamp -->
        <a-cylinder position="3 1 -3" radius="0.1" height="2" color="#FFFF99"></a-cylinder>
        <a-entity light="type: point; color:#ffffaa; intensity:0.8; distance:5" position="3 2 -3"></a-entity>

        <!-- Door -->
        <a-box position="0 0.5 5" width="1" height="1.5" depth="0.1" color="#654321"></a-box>

        <!-- Navigation helpers -->
        <a-text value="Use WASD + Mouse to walk around" position="-4 2 -4" color="#000"></a-text>

    </a-scene>

</body>

</html>
