<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VR Multi-Room Furniture</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <a-scene background="color: #ECECEC" vr-mode-ui="enabled: true" embedded>

        <!-- Room 1 -->
        <a-box position="0 1 -3" depth="4" height="2.5" width="4" color="#f5f5dc" opacity="0.3"></a-box>
        <!-- Furniture Room 1 -->
        <a-box position="-1 0.5 -3" depth="1" height="1" width="2" color="#8B4513"></a-box> <!-- Sofa -->
        <a-cylinder position="1 0.5 -3" radius="0.5" height="1" color="#FFD700"></a-cylinder> <!-- Table -->

        <!-- Room 2 -->
        <a-box position="6 1 -3" depth="4" height="2.5" width="4" color="#ADD8E6" opacity="0.3"></a-box>
        <!-- Furniture Room 2 -->
        <a-box position="5 0.5 -3" depth="1" height="1" width="1.5" color="#A52A2A"></a-box> <!-- Chair -->
        <a-sphere position="7 0.5 -3" radius="0.5" color="#00FF00"></a-sphere> <!-- Small table -->

        <!-- Room 3 -->
        <a-box position="12 1 -3" depth="4" height="2.5" width="4" color="#FFC0CB" opacity="0.3"></a-box>
        <!-- Furniture Room 3 -->
        <a-box position="12 0.5 -2" depth="1" height="1" width="2" color="#0000FF"></a-box> <!-- Bed -->
        <a-cylinder position="12 0.5 -4" radius="0.3" height="1" color="#FFA500"></a-cylinder> <!-- Lamp -->

        <!-- Camera with teleport controls -->
        <a-entity id="rig" position="0 0 0">
            <a-camera wasd-controls look-controls>
                <a-cursor></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Teleport system -->
        <a-entity id="teleport" teleport-controls="button: trigger; collisionEntities: .floor;"></a-entity>

        <!-- Floor for teleport -->
        <a-plane class="floor" rotation="-90 0 0" width="20" height="10" color="#AAA"></a-plane>

    </a-scene>
</body>

</html>
